<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39505f"/>
      <stop offset="45%" stop-color="#4a6877"/>
      <stop offset="100%" stop-color="#6f8d98"/>
    </linearGradient>
    <linearGradient id="fogBand1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7e98a3" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8aa3ac" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="fogBand2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9fb4bc" stop-opacity="0"/>
      <stop offset="100%" stop-color="#a9bcc3" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd27a" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#ffb454" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffb454" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16222a" stop-opacity="0.35"/>
      <stop offset="30%" stop-color="#16222a" stop-opacity="0"/>
      <stop offset="75%" stop-color="#0c1318" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0c1318" stop-opacity="0.55"/>
    </linearGradient>
    <g id="pine">
      <path d="M0,-150 L42,-30 L20,-30 L55,55 L28,55 L62,150 L-62,150 L-28,55 L-55,55 L-20,-30 L-42,-30 Z"/>
    </g>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>

  <!-- far back ridge of faint pines -->
  <g fill="#5c7682" opacity="0.55">
    <use href="#pine" transform="translate(120,430) scale(0.9)"/>
    <use href="#pine" transform="translate(230,440) scale(1.05)"/>
    <use href="#pine" transform="translate(350,425) scale(0.85)"/>
    <use href="#pine" transform="translate(470,445) scale(1.1)"/>
    <use href="#pine" transform="translate(600,430) scale(0.95)"/>
    <use href="#pine" transform="translate(760,420) scale(1.15)"/>
    <use href="#pine" transform="translate(920,440) scale(0.9)"/>
    <use href="#pine" transform="translate(1060,425) scale(1.05)"/>
    <use href="#pine" transform="translate(1200,438) scale(0.88)"/>
    <use href="#pine" transform="translate(1340,422) scale(1.1)"/>
    <use href="#pine" transform="translate(1480,440) scale(0.95)"/>
  </g>

  <rect x="0" y="380" width="1600" height="260" fill="url(#fogBand1)"/>

  <!-- mid pines -->
  <g fill="#4a6470" opacity="0.75">
    <use href="#pine" transform="translate(60,560) scale(1.25)"/>
    <use href="#pine" transform="translate(210,580) scale(1.5)"/>
    <use href="#pine" transform="translate(380,555) scale(1.15)"/>
    <use href="#pine" transform="translate(900,565) scale(1.3)"/>
    <use href="#pine" transform="translate(1080,585) scale(1.6)"/>
    <use href="#pine" transform="translate(1260,558) scale(1.2)"/>
    <use href="#pine" transform="translate(1420,575) scale(1.4)"/>
    <use href="#pine" transform="translate(1550,560) scale(1.1)"/>
  </g>

  <rect x="0" y="520" width="1600" height="220" fill="url(#fogBand2)"/>

  <!-- warm glow behind cabin -->
  <ellipse cx="540" cy="700" rx="260" ry="160" fill="url(#glow)"/>

  <!-- cabin -->
  <g transform="translate(420,610)">
    <!-- roof -->
    <polygon points="0,70 120,0 240,70" fill="#1f2b30"/>
    <rect x="8" y="68" width="224" height="10" fill="#16201f"/>
    <!-- chimney -->
    <rect x="170" y="10" width="18" height="45" fill="#26343a"/>
    <!-- body -->
    <rect x="20" y="78" width="200" height="110" fill="#2b3a40"/>
    <rect x="20" y="78" width="200" height="110" fill="#1c2730" opacity="0.25"/>
    <!-- door -->
    <rect x="108" y="128" width="34" height="60" fill="#171f23"/>
    <!-- windows -->
    <rect x="48" y="118" width="34" height="32" fill="#ffcf86"/>
    <rect x="48" y="118" width="34" height="32" fill="url(#glow)" opacity="0.7"/>
    <rect x="160" y="118" width="34" height="32" fill="#ffcf86"/>
    <rect x="160" y="118" width="34" height="32" fill="url(#glow)" opacity="0.7"/>
    <!-- window cross bars -->
    <rect x="48" y="132" width="34" height="3" fill="#3a2a16"/>
    <rect x="63" y="118" width="3" height="32" fill="#3a2a16"/>
    <rect x="160" y="132" width="34" height="3" fill="#3a2a16"/>
    <rect x="175" y="118" width="3" height="32" fill="#3a2a16"/>
  </g>

  <!-- foreground pines, darker, framing -->
  <g fill="#222e33">
    <use href="#pine" transform="translate(70,840) scale(2.1)"/>
    <use href="#pine" transform="translate(260,900) scale(2.7)"/>
    <use href="#pine" transform="translate(1480,860) scale(2.3)"/>
    <use href="#pine" transform="translate(1330,920) scale(2.9)"/>
    <use href="#pine" transform="translate(1560,950) scale(2.4)"/>
  </g>
  <g fill="#161e22">
    <use href="#pine" transform="translate(-30,900) scale(2.6)"/>
    <use href="#pine" transform="translate(1550,820) scale(2.0)"/>
  </g>

  <rect x="0" y="700" width="1600" height="300" fill="url(#fogBand2)" opacity="0.5"/>

  <rect width="1600" height="1000" fill="url(#vignette)"/>
</svg>
